<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sorry letter for Bala💓</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- SCREEN 1: INITIAL CHOICE SCREEN -->
    <div id="choiceScreen" class="choice-screen active">
      <div class="choice-container">
        <h1 class="choice-title">Choose Your Path 💕</h1>
        <div class="choice-buttons">
          <button id="balaBtn" class="choice-btn bala-btn">
            <span class="btn-emoji">💌</span>
            <span class="btn-text">Sorry Bala</span>
          </button>
          <button id="gauriBtn" class="choice-btn gauri-btn">
            <span class="btn-emoji">👑</span>
            <span class="btn-text">Gauri is My Priority</span>
          </button>
        </div>
      </div>
    </div>

    <!-- SCREEN 2: SORRY BALA - ENVELOPE SECTION (Original) -->
    <div id="envelopeSection" class="envlope-wrapper" style="display: none;">
      <div id="envelope" class="close">
        <div class="front flap"></div>
        <div class="front pocket"></div>
        <div class="letter">
          <div class="words line1">To: Mau</div>
          <div class="words line2">I didn't mean to hurt u😞</div>
          <div class="words line3">Please forgive me🥺</div>
          <div class="words line4">I'm sorry bala😘❤️</div>
        </div>
        <div class="hearts">
          <div class="heart a1"></div>
          <div class="heart a2"></div>
          <div class="heart a3"></div>
        </div>
      </div>
    </div>

    <div class="reset" id="resetSection" style="display: none;">
      <button id="open">Open</button>
      <button id="reset">Close</button>
      <button id="backBtn">Back to Menu</button>
    </div>

    <!-- SCREEN 3: GAURI SECTION - LOVE BUTTONS SCREEN -->
    <div id="gauriChoiceScreen" class="gauri-choice-screen" style="display: none;">
      <div class="gauri-choice-container">
        <button id="backFromGauri" class="back-btn">← Back</button>
        <div class="gauri-message">
          <h2>Which one do you choose? 😊</h2>
        </div>
        <div class="gauri-buttons">
          <button id="howMuchLoveBtn" class="gauri-btn love-btn">
            <span>How much I love you</span>
            <span class="emoji">💕</span>
          </button>
          <button id="noSecondOptionBtn" class="gauri-btn no-option-btn">
            <span>There is no second option</span>
            <span class="emoji">❤️</span>
            <span class="sub-text">cause I love you</span>
          </button>
        </div>
      </div>
    </div>

    <!-- SCREEN 4: ROMANTIC TEXT WITH PICTURE -->
    <div id="romanticScreen" class="romantic-screen" style="display: none;">
      <button id="backFromRomantic" class="back-btn-romantic">← Back</button>
      <div class="romantic-container">
        <!-- ROMANTIC TEXT SECTION -->
        <div id="romanticText" class="romantic-text">
          <p class="text-line line-1">You mean everything to me 💫</p>
          <p class="text-line line-2">Every moment with you is precious ✨</p>
          <p class="text-line line-3">You light up my world 🌟</p>
          <p class="text-line line-4">Forever is not enough time with you 💕</p>
        </div>

        <!-- PICTURE CONTAINER (Hidden until Dabao is clicked) -->
        <div id="pictureSection" class="picture-section" style="display: none;">
          <!-- ADD YOUR CLOUDINARY IMAGE URL HERE -->
          <!-- Replace 'YOUR_CLOUDINARY_URL' with your actual URL -->
          <!-- Example: https://res.cloudinary.com/your-cloud/image/upload/v1234567890/image.jpg -->
          <img id="specialPicture" src="YOUR_CLOUDINARY_URL" alt="Special Picture" class="special-picture">
          <div class="floating-hearts">
            <span class="floating-heart">❤️</span>
            <span class="floating-heart">💕</span>
            <span class="floating-heart">💖</span>
            <span class="floating-heart">❤️</span>
            <span class="floating-heart">💕</span>
          </div>
        </div>
      </div>

      <!-- DABAO BUTTON -->
      <div id="dabaoButtonContainer" class="dabao-container">
        <button id="dabaoBtn" class="dabao-btn">Dabao 🎁</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
