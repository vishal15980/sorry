<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Love Letter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="envlope-wrapper">
  <div id="envelope" class="close">

    <div class="front flap"></div>
    <div class="front pocket"></div>

    <div class="letter">
      <div class="words line1">Dear Crush ❤️</div>
      <div class="words line2">You are special</div>
      <div class="words line3">I like you</div>
      <div class="words line4">Love you 💖</div>
    </div>

    <div class="hearts">
      <div class="heart a1"></div>
      <div class="heart a2"></div>
      <div class="heart a3"></div>
    </div>

  </div>
</div>

<div class="reset">
  <button onclick="openEnvelope()">Open</button>
  <button onclick="closeEnvelope()">Close</button>
</div>

<script src="script.js"></script>

</body>
</html>
