<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorry Letter for bala 💙</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="envlope-wrapper">
  <div id="envelope" class="close">

    <div class="front flap"></div>
    <div class="front pocket"></div>

    <div class="letter">
      <div class="words line1">To: Mau 💙</div>

      <div class="words line2">
        Dear Bala, I'm really sorry🥺
      </div>

      <div class="words line3">
        Last night I didn’t mean to hurt you💔
      </div>

      <div class="words line4">
        I love you so much, please forgive me❤️
      </div>
    </div>

  </div>
</div>

<div class="reset">
  <button onclick="openEnvelope()">Open</button>
  <button onclick="closeEnvelope()">Close</button>
</div>

<script src="script.js"></script>

</body>
</html>
