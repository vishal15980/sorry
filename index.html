<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Letter 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="envlope-wrapper">
  <div id="envelope" class="close">

    <div class="front flap"></div>
    <div class="front pocket"></div>

    <div class="letter">
      <div class="words line1">To: Mau 💙</div>

      <div class="words line2">
        Dear Bala, I'm really sorry 🥺
      </div>

      <div class="words line3">
        Last night I didn’t mean to hurt you 💔
      </div>

      <div class="words line4">
        I love you so much, please forgive me ❤️
      </div>
    </div>

    <!-- Hearts -->
    <div class="hearts">
      <div class="heart a1"></div>
      <div class="heart a2"></div>
      <div class="heart a3"></div>
    </div>

  </div>
</div>

<!-- Buttons -->
<div class="reset">
  <button onclick="openEnvelope()">OPEN</button>
  <button onclick="closeEnvelope()">CLOSE</button>
</div>

<script>
function openEnvelope() {
  document.getElementById("envelope").classList.remove("close");
  document.getElementById("envelope").classList.add("open");
}

function closeEnvelope() {
  document.getElementById("envelope").classList.remove("open");
  document.getElementById("envelope").classList.add("close");
}
</script>

</body>
</html>
