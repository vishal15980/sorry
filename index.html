<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorry Letter for Mau 💓</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="envlope-wrapper">
  <!-- IMPORTANT: keep class="close" -->
  <div id="envelope" class="close">

    <!-- Front -->
    <div class="front flap"></div>
    <div class="front pocket"></div>

    <!-- Letter -->
    <div class="letter">
      <div class="words line1">To: Mau 💙</div>

      <div class="words line2">
        I'm sorry Bala 🥺
      </div>

      <div class="words line3">
        I didn't mean to hurt you last night 💔
      </div>

      <div class="words line4">
        Please forgive me ❤️
      </div>
    </div>

    <!-- Hearts -->
    <div class="hearts">
      <div class="heart a1"></div>
      <div class="heart a2"></div>
      <div class="heart a3"></div>
    </div>

  </div>
</div>

<!-- Buttons (IMPORTANT: keep IDs same) -->
<div class="reset">
  <button id="open">OPEN</button>
  <button id="reset">CLOSE</button>
</div>

<!-- jQuery (REQUIRED for your JS) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<!-- Your JS -->
<script src="script.js"></script>

</body>
</html>
