<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Letter for Mau 💓</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Sorry Letter for Mau 💓</h2>

<div class="envlope-wrapper">
  <div id="envelope" class="close">

    <div class="front flap"></div>
    <div class="front pocket"></div>

    <!-- LETTER -->
    <div class="letter">
      <p>To: Mau 💙</p>
      <p>I’m sorry Bala 🥺</p>
      <p>I didn’t mean to hurt you last night 💔</p>
      <p>Please forgive me ❤️</p>
    </div>

    <!-- HEARTS -->
    <div class="hearts">
      <div class="heart a1"></div>
      <div class="heart a2"></div>
      <div class="heart a3"></div>
    </div>

  </div>
</div>

<div class="reset">
  <button onclick="openEnvelope()">OPEN</button>
  <button onclick="closeEnvelope()">CLOSE</button>
</div>

<script>
function openEnvelope() {
  const env = document.getElementById("envelope");
  env.classList.remove("close");
  env.classList.add("open");
}

function closeEnvelope() {
  const env = document.getElementById("envelope");
  env.classList.remove("open");
  env.classList.add("close");
}
</script>

</body>
</html>
